name: Bilibili Data Monitor

on:
  schedule:
    # 每一小时（第 0 分钟）自动执行一次
    - cron: '0 * * * *'
  # 支持在 GitHub Actions 页面手动点击 "Run workflow" 触发
  workflow_dispatch:

# 核心配置：赋予 Action 往仓库写入文件的权限，解决 exit code 128 错误
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 1. 下载仓库代码到运行环境
      - name: Checkout code
        uses: actions/checkout@v3

      # 2. 安装 Python 运行环境
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      # 3. 安装脚本需要的依赖包（requests 用于网络请求）
      - name: Install dependencies
        run: pip install requests

      # 4. 运行监控脚本
      # 使用 env 将 GitHub Secrets 中配置的私密信息传递给 Python 脚本
      - name: Run script
        env:
          BILI_UID: ${{ secrets.BILI_UID }}
          DINGTALK_WEBHOOK: ${{ secrets.DINGTALK_WEBHOOK }}
        run: python bilibili_monitor.py

      # 5. 将生成的 index.html 和 history.json 同步回仓库
      - name: Commit and Push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # 尝试添加生成的文件，如果文件不存在则不报错
          git add index.html history.json || echo "No files to add"
          
          # 提交更改。使用 [skip ci] 避免由于推送代码导致 Action 无限循环触发
          # 如果没有任何内容变动，则跳过 commit
          git commit -m "Auto update Bilibili data [skip ci]" || echo "No changes to commit"
          
          # 推送到仓库主分支
          git push
