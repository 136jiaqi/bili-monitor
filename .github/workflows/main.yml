name: Bilibili Data Monitor

on:
  schedule:
    # 每一小时（第 0 分钟）自动执行一次
    - cron: '0 * * * *'
  # 支持在 GitHub Actions 页面手动点击 "Run workflow" 触发
  workflow_dispatch:

# 核心配置：赋予 Action 往仓库写入文件的权限
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 1. 下载仓库代码
      - name: Checkout code
        uses: actions/checkout@v3

      # 2. 安装 Python 环境
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      # 3. 安装依赖（增加 playwright 以应对反爬）
      - name: Install dependencies
        run: |
          pip install requests playwright
          playwright install chromium

      # 4. 运行监控脚本
      - name: Run script
        env:
          BILI_UID: ${{ secrets.BILI_UID }}
          DINGTALK_WEBHOOK: ${{ secrets.DINGTALK_WEBHOOK }}
        run: python bilibili_monitor.py

      # 5. 将生成的文件同步回仓库
      - name: Commit and Push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add index.html history.json || echo "No files to add"
          git commit -m "Auto update Bilibili data [skip ci]" || echo "No changes to commit"
          git push
